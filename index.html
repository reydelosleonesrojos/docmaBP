   Plantillas responsive
UX ha facilitado plantillas responsive ya testadas para la creación de emails. UX ha preparado un sistema de plantillas modulares con diversas opciones al
que deben ajustarse todas las comunicaciones.
Tiene cada plantilla una cantidad máxima de módulos y se puede siempre
eliminar alguna línea de bloques, pero nunca añadir más.
En casos excepcionales, las comunicaciones podrán salirse de las plantillas ya establecidas para crear plantillas nuevas, pero siempre teniendo en consideración y respetando las guías de diseño.

  Duplicar/reutilizar creatividades
Las creatividades originales pueden estar desactualizadas y deben revisarse.
Duplicar una creatividad usada en el pasado es una forma ágil de aprovechar el trabajo, pero deben revisarse en profundidad para detectar detalles desactualizado e incoherentes.
• En solo un año, se han cambiado:
• La operación de la empresa, separándola en dos.
• El nombre de la web y sus url.
• El footer estándar.
• La paleta de colores (colores accesibles)
• La firma/cierre de los emails.
Son solo algunos ejemplos de una empresa en constante cambio.
Cuando se duplica una creatividad, sobre todo si es antigua, revisar hasta el último detalle ayuda a que se coherente con la realidad actual de la compañía

  Cambios masivos en creatividades
Evitar la creación excesiva de creatividades y usar AMPscript.
Un número excesivo de creatividades por journey supone multiplicar el trabajo cuando el journey necesita un cambio, actualización o la empresa necesita cambiar el look&feel de sus creatividades (cambio de identidad corporativa, por ejemplo).
Por ello, lo ideal es utilizar AMPscript y content blocks lo más posible, para poder actualizar los elementos fuera de las creatividades (en la Data Extensión, en el block, etc.) y que se propaguen los cambios a todas las creatividades que los llamen con AMPscript.
No hacerlo no solo supone cambiar muchas más creatividades, sino tener que probar muchas más, lo que implica tiempo y coste.
    Si los elementos que llama (p. ej. de una Data Extensión) cambian con frecuencia, puede ser mejor no llamarlos con AMPscript, para evitar que el cliente reciba información contradictoria, al ver estos cambios en su email al consultarlo en el futuro.

• RaiseError supone una cancelación abrupta del envío, pero es poco ortodoxa,       por

   Copias CC y BCC en activities Email
Evitar usarlas
No se recomienda usar las opciones de copia CC y BCC.
Algunos de los motivos para no usarlas son:
• Por seguridad: esos emails/buzones en copia recibirán todas las comunicaciones con los datos personales de los clientes. Es fácil olvidar que se ha configurado estos emails/buzones en copia y que queden eternamente enviando esta información personal, con el tiempo los encargados de estos emails/buzones pueden cambiar o incluso abandonar la compañía, exponiendo de forma peligrosa la información de estas comunicaciones personales.
• Por costes: si ponemos emails/buzones en copia CC y BCC en los journeys se multiplican los envíos reales por tantos emails como se añadan, multiplicando los costes de envío (como mínimo duplicándolos tan pronto se añade un solo email/buzón).
Alternativas:
• Preview and Test: herramienta que permite el envío de una muestra con aspecto muy similar al de un email de producción.
• Añadir un email/buzón entre los destinatarios del envío para recibir un/unos email/ls real/les de producción tras la activación del journey.
• Si el envío es masivo, revisar los enlaces clicados de VAWP (se clican en un 0,1% de ocasiones, por eso es improbable que haya enlaces clicados en envíos pequeños) en Tracking Email puede permitir ver, en formato web, ejemplos de envíos reales.

  Actualización del código VML en emails para Outlook
Cómo actualizar el código VML, para evitar errores en enlaces de botones en emails leídos con Outlook
¿Por qué es importante?
Aunque el código VML aparece comentado en HTML, Outlook lo renderiza directamente. No actualizarlo puede provocar que los botones y sus enlaces no funcionen correctamente para los destinatarios que usan Outlook.
   Campos a actualizar
href dentro del bloque VML
Debe coincidir exactamente con la URL del botón en HTML. Si se actualiza el botón pero no el VML, Outlook enviará a una URL incorrecta.
Texto del botón en <v:textbox>
El texto visible dentro del bloque VML debe ser idéntico al del botón HTML. Outlook renderiza este texto, no el del HTML.
   Esté botón de un email en inglés lleva a una url en catalán en un buzón de Outlook, porque la url está desactualizada en el código VML.
Recomendaciones
1. Hacer búsqueda global del <!—[if mso]> en el HTML para localizar todos los bloques VML del email
2. Actualizar href y texto en cada bloque encontrado que corresponda a un botón, no solo en el primero
3. Verificar en Outlook (o con Litmus/Email on Acid) antes de enviar
4. Bloque VML por cada botón del email - cada CTA (botón) debería tener su propio bloque VML

   Subject y Preheader
Asunto del email y texto de previsualización.
Es fácil obviar, y sucede en algunas comunicaciones de los orígenes del uso de Marketing Cloud, proponer un preheader.
Es habitual que negocio no lo tenga en cuenta, es fácil desconocerlo, pero es una buena práctica no dejarlo vacío, y consultar al negocio al respecto tan pronto se detecte su ausencia en la definición funcional de la comunicación. No rellenarlo manualmente lo rellenará automáticamente con el primer texto del contenido del email, poniendo a primer nivel textos no relevantes.
Del mismo modo, si el subject (asunto) supera los 50 caracteres, debe avisarse al negocio de la alta probabilidad de que el cliente lo vea cortado, por si se desea sintetizarlo.

   El Header y el Footer son dos elementos esenciales que deben contener todo email construido.
• Header: ofrece la posibilidad de ver el email en la web al cliente, debe situarse en la parte superior del email.

        const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        const fetchWithRetry = async (url, options, retries = 5) => {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                return await response.json();
                } catch (error) {
                if (i === retries - 1) throw error;
                await delay(delays[i]);
                }
            }
        };

            const handleLogin = (e) => {
                e.preventDefault();
                if (passwordInput === 'docma123') {
                setIsAuthenticated(true);
                setAuthError('');
                } else {
                setAuthError('Contraseña incorrecta. Por favor, inténtalo de nuevo.');
                }
            };

            const handleSendMessage = async (e) => {
                e.preventDefault();
                if (!inputMessage.trim()) return;

                const userMsg = inputMessage.trim();
                setInputMessage('');
                setMessages(prev => [...prev, { role: 'user', content: userMsg }]);
                setIsLoading(true);

                try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                // Construir el historial para Gemini
                const formattedHistory = messages.map(msg => ({
                    role: msg.role === 'assistant' ? 'model' : 'user',
                    parts: [{ text: msg.content }]
                }));
                
                // Añadir el mensaje actual
                formattedHistory.push({

                const payload = {

                    parts: [{ 
                        text: `Eres un asistente virtual experto en "Best Practices DOCMA" para envíos de comunicaciones en Salesforce Marketing Cloud.
                        
                        REGLAS ESTRICTAS:

                const result = await fetchWithRetry(url, {
